<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C0E14"/>
      <stop offset="1" stop-color="#0F1520"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E63946" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Swiss-style top accent: blue | red split bar -->
  <rect x="0" y="0" width="600" height="4" fill="#0B5FFF"/>
  <rect x="600" y="0" width="600" height="4" fill="#E63946"/>

  <!-- Subtle red glow behind the mark -->
  <circle cx="148" cy="150" r="140" fill="url(#glow)"/>

  <!-- Swiss cross logo (official mark) -->
  <g transform="translate(80,82) scale(1.55)">
    <rect x="0" y="0" width="90" height="90" rx="18" fill="#DC2626"/>
    <polygon points="32,13 58,13 58,28 77,28 77,58 58,58 58,77 32,77 32,58 13,58 13,28 32,28" fill="#FFFFFF"/>
  </g>

  <!-- Vertical divider -->
  <rect x="300" y="78" width="2" height="144" fill="#1E293B"/>

  <!-- Wordmark -->
  <text x="338" y="146" font-size="78" font-weight="800" fill="#EDEDEF" letter-spacing="-1.5">SwissOneLab</text>

  <!-- Tagline (bicolor: Automate blue, Secure red) -->
  <text x="340" y="196" font-size="29" font-weight="600" letter-spacing="0.2" xml:space="preserve"><tspan fill="#3A7FFF">Automate </tspan><tspan fill="#8B8B8E">Everything &amp; </tspan><tspan fill="#FF4D5A">Secure </tspan><tspan fill="#8B8B8E">Everywhere</tspan></text>

  <!-- Domains / positioning line -->
  <text x="342" y="240" font-size="15.5" font-weight="600" fill="#5C5C5F" letter-spacing="3.5">PLATFORM ENGINEERING — SECURITY — AUTOMATION — AI</text>

  <!-- Bottom hairline -->
  <rect x="0" y="297" width="1200" height="3" fill="#131A2B"/>
</svg>
